<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数据跨境合规风险地图</title>
  <style>
    :root {
      --bg: #0b1120;
      --bg-elevated: #0f172a;
      --border-subtle: #1f2937;
      --text-primary: #e5e7eb;
      --text-secondary: #9ca3af;
      --accent: #38bdf8;
      --accent-soft: rgba(56, 189, 248, 0.12);
      --danger: #ef4444;
      --warning: #f97316;
      --success: #22c55e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1e293b 0, #020617 45%, #000 100%);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .app-shell {
      flex: 1;
      max-width: 1280px;
      margin: 16px;
      padding: 20px 20px 16px;
      border-radius: 18px;
      background: radial-gradient(circle at top left, rgba(56,189,248,0.08), transparent 55%),
                  radial-gradient(circle at top right, rgba(239,68,68,0.08), transparent 55%),
                  linear-gradient(135deg, #020617, #020617 40%, #020617 100%);
      border: 1px solid rgba(148, 163, 184, 0.25);
      box-shadow:
        0 22px 45px rgba(15,23,42,0.85),
        0 0 0 1px rgba(15,23,42,0.4),
        0 0 80px rgba(56,189,248,0.15);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .app-header {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .title-main {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .title-badge {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, #38bdf8, transparent 60%),
                  radial-gradient(circle at 70% 70%, #22c55e, transparent 60%),
                  #020617;
      border: 1px solid rgba(148, 163, 184, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 25px rgba(56,189,248,0.55);
      position: relative;
      overflow: hidden;
    }

    .title-badge::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 20% 10%, rgba(248,250,252,0.35), transparent 55%);
      mix-blend-mode: screen;
      opacity: 0.8;
    }

    .title-badge-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      border: 1px solid rgba(226,232,240,0.8);
      box-shadow:
        0 0 0 1px rgba(148,163,184,0.6),
        0 0 12px rgba(59,130,246,0.95);
    }

    .title-text h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .title-text p {
      margin: 2px 0 0;
      font-size: 12px;
      color: var(--text-secondary);
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .pill {
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.5);
      font-size: 11px;
      color: var(--text-secondary);
      background: rgba(15,23,42,0.7);
    }

    .risk-legend {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--text-secondary);
      flex-wrap: wrap;
    }

    .risk-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(15,23,42,0.8);
      border: 1px solid rgba(31,41,55,0.9);
      box-shadow: 0 0 0 1px rgba(15,23,42,0.9);
    }

    .risk-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
    }

    .dot-high {
      background: radial-gradient(circle at 30% 30%, #fecaca, #ef4444);
    }

    .dot-medium {
      background: radial-gradient(circle at 30% 30%, #fed7aa, #f97316);
    }

    .dot-low {
      background: radial-gradient(circle at 30% 30%, #bbf7d0, #22c55e);
    }

    .search-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .search-wrapper {
      position: relative;
      flex: 1 1 220px;
      max-width: 360px;
    }

    .search-input {
      width: 100%;
      padding: 8px 34px 8px 30px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.5);
      background: rgba(15,23,42,0.9);
      color: var(--text-primary);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .search-input::placeholder {
      color: #6b7280;
    }

    .search-input:focus {
      border-color: rgba(56,189,248,0.85);
      box-shadow: 0 0 0 1px rgba(56,189,248,0.4);
      background: rgba(15,23,42,1);
    }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #9ca3af;
    }

    .search-kbd {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 10px;
      padding: 1px 5px 2px;
      border-radius: 4px;
      border: 1px solid rgba(148,163,184,0.7);
      color: #9ca3af;
      background: rgba(15,23,42,0.95);
    }

    .search-hint {
      font-size: 11px;
      color: var(--text-secondary);
    }

    .main-layout {
      display: flex;
      flex: 1;
      gap: 14px;
      min-height: 0;
    }

    .map-card {
      flex: 2.1;
      min-width: 0;
      border-radius: 16px;
      background: radial-gradient(circle at top, rgba(30,64,175,0.4), transparent 55%),
                  radial-gradient(circle at bottom, rgba(16,185,129,0.25), transparent 55%),
                  rgba(15,23,42,0.98);
      border: 1px solid rgba(30,64,175,0.85);
      box-shadow:
        0 18px 35px rgba(15,23,42,0.9),
        0 0 0 1px rgba(15,23,42,0.8),
        0 0 40px rgba(56,189,248,0.25);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }

    .map-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--text-secondary);
    }

    .map-card-header span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .map-badge {
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid rgba(59,130,246,0.8);
      background: rgba(15,23,42,0.85);
      color: #bfdbfe;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .map-container {
      position: relative;
      flex: 1;
      min-height: 320px;
    }

    #riskMap {
      width: 100%;
      height: 100%;
    }

    .map-glow {
      position: absolute;
      inset: 12% 18% auto 18%;
      border-radius: 999px;
      background: radial-gradient(circle at center, rgba(56,189,248,0.3), transparent 70%);
      opacity: 0.65;
      filter: blur(10px);
      pointer-events: none;
    }

    .details-card {
      flex: 1.2;
      min-width: 260px;
      max-width: 360px;
      border-radius: 16px;
      background: radial-gradient(circle at top, rgba(56,189,248,0.14), transparent 55%),
                  rgba(15,23,42,0.98);
      border: 1px solid rgba(75,85,99,0.9);
      box-shadow:
        0 14px 30px rgba(15,23,42,0.9),
        0 0 0 1px rgba(15,23,42,0.8);
      padding: 12px 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .details-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .details-country {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .details-country-name {
      font-size: 16px;
      font-weight: 600;
    }

    .details-country-en {
      font-size: 11px;
      color: var(--text-secondary);
    }

    .details-risk-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      border: 1px solid rgba(148,163,184,0.7);
      background: rgba(15,23,42,0.95);
      color: var(--text-secondary);
    }

    .details-risk-tag {
      font-weight: 500;
    }

    .details-body {
      flex: 1;
      display: grid;
      grid-template-rows: auto auto auto minmax(0, 1fr);
      gap: 8px;
      min-height: 0;
    }

    .section {
      padding: 6px 8px;
      border-radius: 10px;
      background: rgba(15,23,42,0.96);
      border: 1px solid rgba(31,41,55,0.95);
      font-size: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      font-size: 11px;
      color: var(--text-secondary);
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .section-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: rgba(148,163,184,0.7);
    }

    .section-content {
      color: #e5e7eb;
      line-height: 1.5;
    }

    .section-content ul {
      padding-left: 16px;
      margin: 0;
    }

    .section-content li {
      margin-bottom: 2px;
    }

    .section-content .tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 6px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.7);
      font-size: 10px;
      color: #d1d5db;
      margin-right: 4px;
      margin-bottom: 3px;
      background: rgba(15,23,42,0.96);
    }

    .section-content .tag-strong {
      border-color: rgba(248,113,113,0.9);
      color: #fecaca;
    }

    .section-content .tag-soft {
      border-color: rgba(56,189,248,0.7);
      color: #bae6fd;
    }

    .section-content .tag-local {
      border-color: rgba(34,197,94,0.8);
      color: #bbf7d0;
    }

    .section-body-scroll {
      overflow: auto;
      padding-right: 2px;
    }

    .section-body-scroll::-webkit-scrollbar {
      width: 4px;
    }

    .section-body-scroll::-webkit-scrollbar-thumb {
      background: rgba(75,85,99,0.8);
      border-radius: 999px;
    }

    .footer-hint {
      font-size: 10px;
      color: #6b7280;
      text-align: right;
    }

    @media (max-width: 900px) {
      .app-shell {
        margin: 8px;
        padding: 14px 12px 10px;
      }

      .main-layout {
        flex-direction: column;
      }

      .details-card {
        order: 2;
        max-width: none;
      }

      .map-card {
        order: 1;
        min-height: 260px;
      }
    }

    @media (max-width: 600px) {
      .title-text h1 {
        font-size: 17px;
      }

      .search-wrapper {
        max-width: none;
      }

      .map-container {
        min-height: 240px;
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="title-row">
        <div class="title-main">
          <div class="title-badge">
            <div class="title-badge-dot"></div>
          </div>
          <div class="title-text">
            <h1>数据跨境合规风险地图</h1>
            <p>
              针对重点国家/地区的数据出境合规风险一览
              <span class="pill">点击地图或搜索国家查看详情</span>
            </p>
          </div>
        </div>
        <div class="risk-legend">
          风险等级：
          <span class="risk-chip"><span class="risk-dot dot-high"></span>高风险</span>
          <span class="risk-chip"><span class="risk-dot dot-medium"></span>中风险</span>
          <span class="risk-chip"><span class="risk-dot dot-low"></span>低风险</span>
        </div>
      </div>
      <div class="search-row">
        <div class="search-wrapper">
          <span class="search-icon">⌕</span>
          <input
            id="searchInput"
            class="search-input"
            type="text"
            placeholder="搜索国家（中文/英文，如：中国 / China / EU）"
          />
          <span class="search-kbd">Enter</span>
        </div>
        <div class="search-hint">已配置 10 个重点国家/地区的数据跨境规则</div>
      </div>
    </header>

    <main class="main-layout">
      <section class="map-card">
        <div class="map-card-header">
          <span>
            地图视图
            <span style="opacity:0.8;">· 点击国家高亮并在右侧查看详情</span>
          </span>
          <span class="map-badge">WORLD · RISK VIEW</span>
        </div>
        <div class="map-container">
          <div id="riskMap"></div>
          <div class="map-glow"></div>
        </div>
      </section>

      <aside class="details-card">
        <div class="details-header">
          <div class="details-country">
            <div class="details-country-name" id="countryName"></div>
            <div class="details-country-en" id="countryNameEn"></div>
          </div>
          <div class="details-risk-pill">
            <span id="riskLevelTag" class="details-risk-tag"></span>
            <span id="riskSummary"></span>
          </div>
        </div>

        <div class="details-body">
          <div class="section">
            <div class="section-header">
              <div class="section-title">
                <span class="section-dot"></span>
                法规框架
              </div>
              <span id="regulationUpdate" style="font-size:10px;color:#6b7280;"></span>
            </div>
            <div class="section-content section-body-scroll" id="regulations"></div>
          </div>

          <div class="section">
            <div class="section-header">
              <div class="section-title">
                <span class="section-dot"></span>
                传输机制 / 合法基础
              </div>
            </div>
            <div class="section-content section-body-scroll" id="transferMechanism"></div>
          </div>

          <div class="section">
            <div class="section-header">
              <div class="section-title">
                <span class="section-dot"></span>
                数据本地化 / 存储要求
              </div>
            </div>
            <div class="section-content section-body-scroll" id="localization"></div>
          </div>

          <div class="section">
            <div class="section-header">
              <div class="section-title">
                <span class="section-dot"></span>
                典型执法案例 / 风险提示
              </div>
            </div>
            <div class="section-content section-body-scroll" id="enforcement"></div>
          </div>
        </div>

        <div class="footer-hint">
          内容为基于公开资料的合规参考，具体项目请结合最新法规与专业法律意见。
        </div>
      </aside>
    </main>
  </div>

  <script>
    // 数据来源为公开法规与监管信息的高度概括，仅供合规参考而非法律意见
    var countryConfig = {
      China: {
        code: "CN",
        zhName: "中国",
        enName: "China",
        mapName: "China",
        aliases: ["中国", "CN", "PRC", "People's Republic of China"],
        riskLevel: "高风险",
        riskScore: 3,
        riskSummary: "数据出境监管严格，合规门槛高",
        regulationUpdate: "关键法规：个保法、网安法、数据安全法及配套规则",
        regulationsHtml:
          '<div><span class="tag tag-strong">个人信息保护法（PIPL）</span><span class="tag tag-strong">网络安全法</span><span class="tag tag-strong">数据安全法</span></div>' +
          "<ul>" +
          "<li>跨境提供个人信息须符合 PIPL 第三章第三节要求。</li>" +
          "<li>关键信息基础设施运营者、处理达到数量阈值的个人信息处理者需进行安全评估。</li>" +
          "<li>数据分类分级、重要数据识别与跨境规则由行业主管部门细化。</li>" +
          "</ul>",
        transferMechanismHtml:
          '<div><span class="tag tag-soft">安全评估</span><span class="tag tag-soft">标准合同（SCC-China）</span><span class="tag tag-soft">个人信息保护认证</span></div>' +
          "<ul>" +
          "<li>达到阈值或涉及重要数据时须向网信部门申请数据出境安全评估。</li>" +
          "<li>未触发评估的，可通过与境外接收方签署中国版标准合同，或通过认证路径实现合规。</li>" +
          "<li>需履行个人信息影响评估、告知同意及合同约束等义务。</li>" +
          "</ul>",
        localizationHtml:
          '<div><span class="tag tag-local">关基本地存储</span><span class="tag tag-local">重要数据原则上境内存储</span></div>' +
          "<ul>" +
          "<li>关键信息基础设施运营者收集产生的个人信息和重要数据应在境内存储，确需出境的须评估。</li>" +
          "<li>重要数据需按照国家规定开展本地化存储与出境安全评估。</li>" +
          "<li>云服务和跨境远程访问方案通常被视为数据出境情形。</li>" +
          "</ul>",
        enforcementHtml:
          "<ul>" +
          "<li>网信部门及多部委联合开展“清朗”“网安”专项行动，对违法出境、越权处理等行为实施高额罚款与整治。</li>" +
          "<li>重点行业（金融、运营商、互联网平台）数据跨境项目普遍需要前置合规论证。</li>" +
          "<li>建议对数据出境场景进行 DPIA、建立目录台账，并预留审计与监管抽查证据。</li>" +
          "</ul>",
      },
      "United States": {
        code: "US",
        zhName: "美国",
        enName: "United States",
        mapName: "United States of America",
        aliases: ["美国", "US", "USA"],
        riskLevel: "中风险",
        riskScore: 2,
        riskSummary: "联邦层面分散监管，对安全与政府访问敏感",
        regulationUpdate: "关键：州法（CCPA/CPRA 等）、部门监管与 CLOUD Act",
        regulationsHtml:
          '<div><span class="tag tag-strong">CCPA/CPRA（加州）</span><span class="tag tag-strong">州级隐私法（VA/CO/CT 等）</span><span class="tag">HIPAA / GLBA / COPPA</span></div>' +
          "<ul>" +
          "<li>缺乏统一的联邦综合隐私法，以行业法与州法为主。</li>" +
          "<li>加州隐私法规对“出售”与跨境共享有较严格的告知、退出和合同要求。</li>" +
          "<li>政府访问（FISA 702、CLOUD Act）被其他法域视为跨境传输时的风险点。</li>" +
          "</ul>",
        transferMechanismHtml:
          '<div><span class="tag tag-soft">合同条款 / DPA</span><span class="tag tag-soft">技术措施（加密、分片）</span></div>' +
          "<ul>" +
          "<li>重点关注与美国服务提供商签署的数据处理协议（DPA）、安全附件及子处理方约束。</li>" +
          "<li>对来自欧盟等地区的数据，应结合 EU–US Data Privacy Framework 或 SCC+补充保障。</li>" +
          "<li>实际实践中广泛依赖技术措施（端到端加密、密钥托管在境内等）降低政府访问风险。</li>" +
          "</ul>",
        localizationHtml:
          "<ul>" +
          "<li>联邦层面通常不强制数据本地化，但行业监管（金融、医疗）可能对存储与访问位置有要求。</li>" +
          "<li>部分跨境项目从其他高要求法域视角，会采用“美国数据分区”或隔离环境方案。</li>" +
          "</ul>",
        enforcementHtml:
          "<ul>" +
          "<li>FTC、州总检察长依托“不公平/欺骗性行为”框架频繁对隐私与安全事件执法。</li>" +
          "<li>加州隐私局（CPPA）和多州联合诉讼对大型互联网平台采取高额和解和结构性整改要求。</li>" +
          "<li>EU 与 US 在政府访问问题上的司法争议（如 Schrems 系列案件）持续影响跨境评估。</li>" +
          "</ul>",
      },
      "European Union": {
        code: "EU",
        zhName: "欧盟",
        enName: "European Union",
        mapName: "European Union",
        aliases: ["欧盟", "EU", "European Union", "EU27", "欧盟地区"],

    var countryMapData = Object.keys(countryConfig).map(function (key) {

    function renderDetailPanel(config) {
      if (!config) return;
      document.getElementById("countryName").textContent = config.zhName;
      document.getElementById("countryNameEn").textContent = config.enName;
      var riskTag = document.getElementById("riskLevelTag");
      riskTag.textContent = config.riskLevel;
      riskTag.style.color = riskColors[config.riskLevel] || "#e5e7eb";
      riskTag.style.textShadow = "0 0 8px " + (riskColors[config.riskLevel] || "#6b7280");
      document.getElementById("riskSummary").textContent = " · " + (config.riskSummary || "");
      document.getElementById("regulationUpdate").textContent = config.regulationUpdate || "";
      document.getElementById("regulations").innerHTML = config.regulationsHtml || "";
      document.getElementById("transferMechanism").innerHTML = config.transferMechanismHtml || "";
      document.getElementById("localization").innerHTML = config.localizationHtml || "";
      document.getElementById("enforcement").innerHTML = config.enforcementHtml || "";
    }

    function findConfigByName(name) {
      if (!name) return null;
      var lower = name.trim().toLowerCase();
      var keys = Object.keys(countryConfig);
      for (var i = 0; i < keys.length; i++) {
        var cfg = countryConfig[keys[i]];
        if (!cfg) continue;
        if (
          (cfg.mapName && cfg.mapName.toLowerCase() === lower) ||
          (cfg.zhName && cfg.zhName.toLowerCase() === lower) ||
          (cfg.enName && cfg.enName.toLowerCase() === lower)
        ) {
          return cfg;
        }
        if (cfg.aliases && cfg.aliases.length) {
          for (var j = 0; j < cfg.aliases.length; j++) {
            if (cfg.aliases[j].toLowerCase() === lower) return cfg;
          }
        }
      }
      // 宽松包含匹配
      for (var k = 0; k < keys.length; k++) {
        var c = countryConfig[keys[k]];
        if (!c) continue;
        if (
          (c.zhName && c.zhName.toLowerCase().indexOf(lower) !== -1) ||
          (c.enName && c.enName.toLowerCase().indexOf(lower) !== -1)
        ) {
          return c;
        }
      }
      return null;
    }

    function highlightCountryByMapName(chart, mapName) {
      if (!chart || !mapName) return;
      chart.dispatchAction({
        type: "downplay",
        seriesIndex: 0,
      });
      chart.dispatchAction({
        type: "highlight",
        seriesIndex: 0,
        name: mapName,
      });
      chart.dispatchAction({
        type: "showTip",
        seriesIndex: 0,
        name: mapName,
      });
    }

    function initMap() {
      var chart = getEChartsInstance();
      if (!chart) return;

      var option = buildChartOption("China");
      chart.setOption(option);

      // 默认展示中国
      var defaultCfg = countryConfig["China"];
      renderDetailPanel(defaultCfg);
      highlightCountryByMapName(chart, defaultCfg.mapName);

      chart.on("click", function (params) {
        var cfg = findConfigByName(params.name);
        if (!cfg) return;
        renderDetailPanel(cfg);
        highlightCountryByMapName(chart, cfg.mapName);
      });

      window.addEventListener("resize", function () {
        chart.resize();
      });

      // 绑定搜索
      var searchInput = document.getElementById("searchInput");
      if (searchInput) {
        searchInput.addEventListener("keyup", function (e) {
          if (e.key === "Enter") {
            var value = e.target.value;
            var cfg = findConfigByName(value);
            if (cfg) {
              renderDetailPanel(cfg);
              highlightCountryByMapName(chart, cfg.mapName);
            }
          }
        });
      }
    }

    // 从 CDN 加载 world GeoJSON 并注册到 ECharts，确保地图初始化在数据就绪之后进行
    function loadWorldMapAndInit() {
      // 使用 jsDelivr 的 echarts-map 镜像加载 world GeoJSON
      // 该 CDN 默认带有 Access-Control-Allow-Origin: *，避免本地 file:// 场景的 CORS 问题
      var worldGeoJsonUrl =
        "https://cdn.jsdelivr.net/npm/echarts-map@3.0.1/json/world.json";

      fetch(worldGeoJsonUrl)
        .then(function (response) {
          if (!response.ok) {
            throw new Error("加载 world 地图失败: " + response.status);
          }
          return response.json();
        })
        .then(function (geoJson) {
          if (typeof echarts !== "undefined" && geoJson) {
            echarts.registerMap("world", geoJson);
          }
          initMap();
        })
        .catch(function (error) {
          console.error("加载 world GeoJSON 出错:", error);
        });
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", loadWorldMapAndInit);
    } else {
      loadWorldMapAndInit();
    }
  </script>
</body>
</html>

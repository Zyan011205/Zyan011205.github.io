<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重要事务记录 & 闹钟提醒</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 头部样式 */
        .header {
            position: relative;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .app-title {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .current-time {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 20px;
        }

        .add-task-btn {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .add-task-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        /* 右上角按钮样式 */
        .notification-buttons {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 1000;
        }

        .btn-notification, .btn-test {
            background: #fef3c7;
            color: #d97706;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border: 2px solid #fbbf24;
        }

        .btn-notification:hover, .btn-test:hover {
            background: #fde68a;
            transform: translateY(-1px);
        }

        /* 统计卡片样式 */
        .stats-section {
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-value.primary { color: #3b82f6; }
        .stat-value.warning { color: #f59e0b; }
        .stat-value.success { color: #10b981; }
        .stat-value.default { color: #6b7280; }

        .stat-title {
            color: #666;
            font-size: 1rem;
        }

        /* 任务区域样式 */
        .tasks-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .section-title {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #333;
            border-bottom: 3px solid #3b82f6;
            padding-bottom: 10px;
        }

        .tasks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .task-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            border-left: 5px solid #e5e7eb;
            transition: all 0.3s ease;
        }

        .task-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .task-card.high { border-left-color: #ef4444; }
        .task-card.medium { border-left-color: #f59e0b; }
        .task-card.low { border-left-color: #10b981; }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .task-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            flex: 1;
        }

        .task-completed {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .task-description {
            color: #666;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .task-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .tag {
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .tag-high { background: #fee2e2; color: #dc2626; }
        .tag-medium { background: #fef3c7; color: #d97706; }
        .tag-low { background: #dcfce7; color: #16a34a; }
        .tag-date { background: #dbeafe; color: #2563eb; }
        .tag-reminder { background: #fef3c7; color: #d97706; }

        .task-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .btn-edit {
            background: #dbeafe;
            color: #2563eb;
        }

        .btn-calendar {
            background: #dcfce7;
            color: #16a34a;
        }

        .btn-delete {
            background: #fee2e2;
            color: #dc2626;
        }

        /* 模态框样式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #374151;
        }

        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
        }

        .form-textarea {
            resize: vertical;
            min-height: 60px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .form-hint {
            font-size: 0.8rem;
            color: #6b7280;
            margin-top: 5px;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .btn-cancel {
            background: #f3f4f6;
            color: #374151;
        }

        .btn-save {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .app-title {
                font-size: 2rem;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .tasks-grid {
                grid-template-columns: 1fr;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="app-title">重要事务记录 & 闹钟提醒</h1>
            <div class="current-time" id="currentTime"></div>
            <button class="add-task-btn" onclick="openAddModal()">➕ 添加任务</button>
            
            <!-- 右上角按钮区域 -->
            <div class="notification-buttons">
                <button class="btn-notification" onclick="toggleNotification()">🔔 开启提醒</button>
                <button class="btn-test" onclick="testReminder()">⏰ 测试提醒</button>
            </div>
        </div>

        <div class="stats-section">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value primary" id="totalTasks">0</div>
                    <div class="stat-title">总任务</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value warning" id="pendingTasks">0</div>
                    <div class="stat-title">待完成</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value success" id="completedTasks">0</div>
                    <div class="stat-title">已完成</div>
                </div>
            </div>
        </div>

        <div class="tasks-section">
            <h2 class="section-title">📋 任务列表</h2>
            <div class="tasks-grid" id="tasksGrid">
                <!-- 任务卡片将动态生成 -->
            </div>
        </div>
    </div>

    <!-- 任务编辑模态框 -->
    <div class="modal" id="taskModal">
        <div class="modal-content">
            <div class="modal-header" id="modalTitle">添加任务</div>
            <form id="taskForm">
                <div class="form-group">
                    <label class="form-label">任务标题</label>
                    <input type="text" class="form-input" id="taskTitle" placeholder="请输入任务标题" required>
                </div>

                <div class="form-group">
                    <label class="form-label">任务描述</label>
                    <textarea class="form-textarea" id="taskDescription" placeholder="请输入任务描述（可选）"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">优先级</label>
                        <select class="form-select" id="taskPriority">
                            <option value="high">🔴 高优先级</option>
                            <option value="medium" selected>🟡 中优先级</option>
                            <option value="low">🟢 低优先级</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">截止日期和时间</label>
                        <div class="form-row">
                            <input type="date" class="form-input" id="taskDueDate" placeholder="选择日期">
                            <input type="time" class="form-input" id="taskDueTime" placeholder="选择时间">
                        </div>
                        <div class="form-hint">设置具体时间，提醒功能将更精确</div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-cancel" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-save">保存任务</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 全局变量
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [
            {
                id: '1',
                title: '完成项目报告',
                description: '整理本月项目进展，准备周会汇报材料',
                completed: false,
                priority: 'high',
                dueDate: new Date(Date.now() + 2 * 24 * 60 * 60 * 1000).toISOString().split('T')[0],
                createdAt: new Date().toISOString()
            },
            {
                id: '2',
                title: '团队会议',
                description: '讨论下季度产品规划',
                completed: false,
                priority: 'medium',
                dueDate: new Date(Date.now() + 1 * 24 * 60 * 60 * 1000).toISOString().split('T')[0],
                createdAt: new Date().toISOString()
            }
        ];

        let editingTaskId = null;

        // 初始化应用
        document.addEventListener('DOMContentLoaded', function() {
            updateCurrentTime();
            setInterval(updateCurrentTime, 1000);
            renderTasks();
            updateStats();
        });

        // 更新当前时间
        function updateCurrentTime() {
            const now = new Date();
            const timeString = now.toLocaleString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                weekday: 'long'
            });
            document.getElementById('currentTime').textContent = timeString;
        }

        // 渲染任务列表
        function renderTasks() {
            const tasksGrid = document.getElementById('tasksGrid');
            tasksGrid.innerHTML = '';

            tasks.forEach(task => {
                const taskCard = createTaskCard(task);
                tasksGrid.appendChild(taskCard);
            });
        }

        // 创建任务卡片
        function createTaskCard(task) {
            const card = document.createElement('div');
            card.className = `task-card ${task.priority}`;
            
            const priorityText = {
                high: '🔴 高优先级',
                medium: '🟡 中优先级',
                low: '🟢 低优先级'
            };

            const dueDate = task.dueDate ? new Date(task.dueDate) : null;
            const formattedDueDate = dueDate ? dueDate.toLocaleString('zh-CN', {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            }) : '';

            card.innerHTML = `
                <div class="task-header">
                    <div class="task-title">${task.title}</div>
                    <input type="checkbox" class="task-completed" ${task.completed ? 'checked' : ''} 
                           onchange="toggleTaskComplete('${task.id}')">
                </div>
                
                ${task.description ? `<div class="task-description">${task.description}</div>` : ''}
                
                <div class="task-meta">
                    <span class="tag tag-${task.priority}">${priorityText[task.priority]}</span>
                    ${dueDate ? `<span class="tag tag-date">📅 ${formattedDueDate}</span>` : ''}
                </div>
                
                <div class="task-actions">
                    <button class="btn btn-edit" onclick="editTask('${task.id}')">
                        ✏️ 编辑
                    </button>
                    <button class="btn btn-calendar" onclick="exportToCalendar('${task.id}')" title="添加到日历">
                        📅 日历
                    </button>
                    <button class="btn btn-delete" onclick="deleteTask('${task.id}')">
                        🗑️ 删除
                    </button>
                </div>
            `;

            return card;
        }

        // 更新统计信息
        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const pending = total - completed;

            document.getElementById('totalTasks').textContent = total;
            document.getElementById('pendingTasks').textContent = pending;
            document.getElementById('completedTasks').textContent = completed;
        }

        // 切换任务完成状态
        function toggleTaskComplete(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTasks();
                updateStats();
            }
        }

        // 打开添加任务模态框
        function openAddModal() {
            editingTaskId = null;
            document.getElementById('modalTitle').textContent = '➕ 添加任务';
            document.getElementById('taskForm').reset();
            document.getElementById('taskModal').classList.add('show');
        }

        // 编辑任务
        function editTask(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (task) {
                editingTaskId = taskId;
                document.getElementById('modalTitle').textContent = '✏️ 编辑任务';
                document.getElementById('taskTitle').value = task.title;
                document.getElementById('taskDescription').value = task.description || '';
                document.getElementById('taskPriority').value = task.priority;
                
                if (task.dueDate) {
                    const dueDate = new Date(task.dueDate);
                    document.getElementById('taskDueDate').value = dueDate.toISOString().split('T')[0];
                    document.getElementById('taskDueTime').value = dueDate.toTimeString().slice(0, 5);
                } else {
                    document.getElementById('taskDueDate').value = '';
                    document.getElementById('taskDueTime').value = '';
                }
                document.getElementById('taskModal').classList.add('show');
            }
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('taskModal').classList.remove('show');
        }

        // 删除任务
        function deleteTask(taskId) {
            if (confirm('确定要删除这个任务吗？')) {
                tasks = tasks.filter(t => t.id !== taskId);
                saveTasks();
                renderTasks();
                updateStats();
            }
        }

        // 保存任务表单
        document.getElementById('taskForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const dueDate = document.getElementById('taskDueDate').value;
            const dueTime = document.getElementById('taskDueTime').value;
            let dueDateTime = null;
            
            if (dueDate && dueTime) {
                // 组合日期和时间
                dueDateTime = new Date(dueDate + 'T' + dueTime + ':00').toISOString();
            } else if (dueDate) {
                // 只有日期，默认设置为当天中午12点
                dueDateTime = new Date(dueDate + 'T12:00:00').toISOString();
            }
            
            const formData = {
                title: document.getElementById('taskTitle').value.trim(),
                description: document.getElementById('taskDescription').value.trim(),
                priority: document.getElementById('taskPriority').value,
                dueDate: dueDateTime
            };

            if (!formData.title) {
                alert('请输入任务标题！');
                return;
            }

            if (editingTaskId) {
                // 编辑现有任务
                const taskIndex = tasks.findIndex(t => t.id === editingTaskId);
                if (taskIndex !== -1) {
                    tasks[taskIndex] = { ...tasks[taskIndex], ...formData };
                }
            } else {
                // 添加新任务
                const newTask = {
                    ...formData,
                    id: Date.now().toString(),
                    completed: false,
                    createdAt: new Date().toISOString()
                };
                tasks.unshift(newTask);
            }

            saveTasks();
            renderTasks();
            updateStats();
            closeModal();
        });

        // 保存任务到本地存储
        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        // 点击模态框外部关闭
        document.getElementById('taskModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // ESC键关闭模态框
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // 导出到日历功能
        function exportToCalendar(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;

            // 创建日历选择模态框
            const calendarModal = document.createElement('div');
            calendarModal.className = 'modal show';
            calendarModal.innerHTML = `
                <div class="modal-content">
                    <h3 style="margin-bottom: 20px;">📅 添加到日历</h3>
                    <p style="margin-bottom: 20px;">选择要导出的日历类型：</p>
                    
                    <div style="display: grid; gap: 10px; margin-bottom: 20px;">
                        <button class="btn" onclick="generateGoogleCalendar('${taskId}')" style="background: #4285f4; color: white;">
                            📘 Google日历
                        </button>
                        <button class="btn" onclick="generateOutlookCalendar('${taskId}')" style="background: #0078d4; color: white;">
                            📧 Outlook日历
                        </button>
                        <button class="btn" onclick="generateICSCalendar('${taskId}')" style="background: #34a853; color: white;">
                            📄 ICS文件（通用）
                        </button>
                    </div>
                    
                    <button class="btn btn-cancel" onclick="closeCalendarModal()">取消</button>
                </div>
            `;
            
            document.body.appendChild(calendarModal);
        }

        function closeCalendarModal() {
            const modal = document.querySelector('.modal.show');
            if (modal) modal.remove();
        }

        // 生成Google日历链接
        function generateGoogleCalendar(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (!task || !task.dueDate) {
                alert('请先设置任务的截止日期');
                return;
            }

            const startDate = new Date(task.dueDate);
            const endDate = new Date(startDate.getTime() + 60 * 60 * 1000); // 1小时后

            const googleUrl = new URL('https://calendar.google.com/calendar/render');
            googleUrl.searchParams.set('action', 'TEMPLATE');
            googleUrl.searchParams.set('text', task.title);
            googleUrl.searchParams.set('details', task.description || '重要任务提醒');
            googleUrl.searchParams.set('dates', 
                startDate.toISOString().replace(/[-:]/g, '').replace(/\.\d{3}/, '') + 
                '/' + 
                endDate.toISOString().replace(/[-:]/g, '').replace(/\.\d{3}/, '')
            );

            window.open(googleUrl.toString(), '_blank');
            closeCalendarModal();
        }

        // 生成Outlook日历链接
        function generateOutlookCalendar(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (!task || !task.dueDate) {
                alert('请先设置任务的截止日期');
                return;
            }

            const startDate = new Date(task.dueDate);
            const endDate = new Date(startDate.getTime() + 60 * 60 * 1000);

            const outlookUrl = new URL('https://outlook.live.com/calendar/0/deeplink/compose');
            outlookUrl.searchParams.set('path', '/calendar/action/compose');
            outlookUrl.searchParams.set('rru', 'addevent');
            outlookUrl.searchParams.set('subject', task.title);
            outlookUrl.searchParams.set('body', task.description || '重要任务提醒');
            outlookUrl.searchParams.set('startdt', startDate.toISOString());
            outlookUrl.searchParams.set('enddt', endDate.toISOString());

            window.open(outlookUrl.toString(), '_blank');
            closeCalendarModal();
        }

        // 生成ICS文件下载
        function generateICSCalendar(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (!task || !task.dueDate) {
                alert('请先设置任务的截止日期');
                return;
            }

            const startDate = new Date(task.dueDate);
            const endDate = new Date(startDate.getTime() + 60 * 60 * 1000);

            const icsContent = [
                'BEGIN:VCALENDAR',
                'VERSION:2.0',
                'BEGIN:VEVENT',
                'SUMMARY:' + task.title,
                'DESCRIPTION:' + (task.description || '重要任务提醒'),
                'DTSTART:' + startDate.toISOString().replace(/[-:]/g, '').replace(/\.\d{3}/, ''),
                'DTEND:' + endDate.toISOString().replace(/[-:]/g, '').replace(/\.\d{3}/, ''),
                'END:VEVENT',
                'END:VCALENDAR'
            ].join('\n');

            const blob = new Blob([icsContent], { type: 'text/calendar' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = task.title + '.ics';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            closeCalendarModal();
        }

        // 点击日历模态框外部关闭
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('modal') && e.target.classList.contains('show')) {
                e.target.remove();
            }
        });

        // 浏览器通知功能
        function requestNotificationPermission(showPrompt = false) {
            if (!('Notification' in window)) {
                if (showPrompt) {
                    alert('您的浏览器不支持通知功能，请使用Chrome、Firefox或Edge浏览器');
                }
                return false;
            }

            if (Notification.permission === 'granted') {
                if (showPrompt) {
                    showNotification('通知测试', '通知功能已正常开启！');
                }
                return true;
            } else if (Notification.permission === 'default') {
                Notification.requestPermission().then(permission => {
                    if (permission === 'granted') {
                        if (showPrompt) {
                            showNotification('通知权限已开启', '任务提醒功能已激活！');
                            // 移除提示框
                            const prompt = document.querySelector('.notification-prompt');
                            if (prompt) prompt.remove();
                        }
                        return true;
                    } else {
                        if (showPrompt) {
                            alert('通知权限被拒绝，将无法收到任务提醒');
                        }
                    }
                });
            } else {
                if (showPrompt) {
                    alert('通知权限已被拒绝，请在浏览器设置中重新启用');
                }
            }
            return false;
        }

        function showNotification(title, body) {
            if (Notification.permission === 'granted') {
                const notification = new Notification(title, {
                    body: body,
                    icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%236366f1"/><text x="50" y="60" font-size="40" text-anchor="middle" fill="white">⏰</text></svg>',
                    tag: 'task-reminder'
                });

                notification.onclick = function() {
                    window.focus();
                    notification.close();
                };

                // 自动关闭通知
                setTimeout(() => {
                    notification.close();
                }, 5000);
            }
        }

        // 闹钟提醒功能
        let reminderIntervals = {};

        function setTaskReminder(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (!task || !task.dueDate || task.completed) return;

            // 清除之前的提醒
            clearTaskReminder(taskId);

            const dueTime = new Date(task.dueDate).getTime();
            const now = Date.now();
            const timeDiff = dueTime - now;

            // 如果时间已过，跳过设置
            if (timeDiff <= 0) return;

            // 设置提醒
            reminderIntervals[taskId] = setTimeout(() => {
                if (requestNotificationPermission()) {
                    showNotification('任务提醒 ⏰', `"${task.title}" 的时间到了！`);
                    
                    // 播放提示音
                    playReminderSound();
                }
                
                // 清除提醒间隔
                delete reminderIntervals[taskId];
            }, timeDiff);

            console.log(`为任务"${task.title}"设置了提醒，将在 ${new Date(dueTime).toLocaleString()} 提醒`);
        }

        function clearTaskReminder(taskId) {
            if (reminderIntervals[taskId]) {
                clearTimeout(reminderIntervals[taskId]);
                delete reminderIntervals[taskId];
            }
        }

        function playReminderSound() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
                oscillator.frequency.setValueAtTime(600, audioContext.currentTime + 0.1);
                oscillator.frequency.setValueAtTime(800, audioContext.currentTime + 0.2);
                
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.5);
            } catch (error) {
                console.log('音频播放失败，但通知已发送');
            }
        }

        // 修改保存任务函数，添加提醒设置
        const originalSaveTask = saveTask;
        saveTask = function(taskData, taskId) {
            const result = originalSaveTask.call(this, taskData, taskId);
            
            // 设置或更新提醒
            if (result && taskData.dueDate && !taskData.completed) {
                setTaskReminder(result.id);
            } else if (result && taskData.completed) {
                clearTaskReminder(result.id);
            }
            
            return result;
        };

        // 修改删除任务函数，清除提醒
        const originalDeleteTask = deleteTask;
        deleteTask = function(taskId) {
            clearTaskReminder(taskId);
            return originalDeleteTask.call(this, taskId);
        };

        // 修改切换完成状态函数
        const originalToggleTask = toggleTask;
        toggleTask = function(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (task) {
                if (task.completed) {
                    // 从已完成切换到待完成，重新设置提醒
                    if (task.dueDate) {
                        setTaskReminder(taskId);
                    }
                } else {
                    // 从未完成切换到已完成，清除提醒
                    clearTaskReminder(taskId);
                }
            }
            return originalToggleTask.call(this, taskId);
        };

        // 页面加载时设置所有未完成任务的提醒
        function setupAllReminders() {
            tasks.forEach(task => {
                if (task.dueDate && !task.completed) {
                    setTaskReminder(task.id);
                }
            });
        }

        // 页面加载完成后设置提醒和检查权限
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(setupAllReminders, 1000);
            checkNotificationStatus();
        });

        // 检查通知状态
        function checkNotificationStatus() {
            if (!('Notification' in window)) {
                console.log('浏览器不支持通知功能');
                return;
            }
            
            if (Notification.permission === 'default') {
                console.log('通知权限未设置，等待用户授权');
                showPermissionPrompt();
            } else if (Notification.permission === 'granted') {
                console.log('通知权限已授权');
            } else {
                console.log('通知权限被拒绝');
            }
        }

        // 显示权限提示
        function showPermissionPrompt() {
            const prompt = document.createElement('div');
            prompt.className = 'notification-prompt';
            prompt.innerHTML = `
                <div class="prompt-content">
                    <h3>🔔 开启提醒功能</h3>
                    <p>为了在任务时间到时收到通知，请允许浏览器发送通知</p>
                    <div class="prompt-actions">
                        <button class="btn btn-primary" onclick="requestNotificationPermission(true)">允许通知</button>
                        <button class="btn btn-secondary" onclick="this.parentElement.parentElement.parentElement.remove()">稍后再说</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(prompt);
        }

        // 添加提示样式
        const promptStyle = document.createElement('style');
        promptStyle.textContent = `
            .notification-prompt {
                position: fixed;
                top: 20px;
                right: 20px;
                background: white;
                border-radius: 12px;
                padding: 20px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.2);
                z-index: 10000;
                max-width: 300px;
                border-left: 4px solid #6366f1;
            }
            
            .notification-prompt h3 {
                margin: 0 0 10px 0;
                color: #1f2937;
            }
            
            .notification-prompt p {
                margin: 0 0 15px 0;
                color: #6b7280;
                font-size: 14px;
            }
            
            .prompt-actions {
                display: flex;
                gap: 10px;
            }
            
            .btn-primary {
                background: #6366f1;
                color: white;
                border: none;
                padding: 8px 16px;
                border-radius: 6px;
                cursor: pointer;
            }
            
            .btn-secondary {
                background: #f3f4f6;
                color: #374151;
                border: none;
                padding: 8px 16px;
                border-radius: 6px;
                cursor: pointer;
            }
        `;
        document.head.appendChild(promptStyle);

        // 添加通知设置按钮到界面
        function addNotificationButton() {
            const header = document.querySelector('.header');
            if (header) {
                // 确保header有相对定位
                header.style.position = 'relative';
                
                // 创建按钮容器
                const buttonContainer = document.createElement('div');
                buttonContainer.style.cssText = 'position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 1000;';
                
                // 通知按钮
                const notificationBtn = document.createElement('button');
                notificationBtn.className = 'btn btn-notification';
                
                // 根据权限状态设置按钮文本
                if (Notification.permission === 'granted') {
                    notificationBtn.innerHTML = '🔔 测试通知';
                    notificationBtn.style.background = '#dcfce7';
                    notificationBtn.style.color = '#16a34a';
                } else {
                    notificationBtn.innerHTML = '🔔 开启提醒';
                }
                
                notificationBtn.onclick = function() {
                    if (Notification.permission === 'granted') {
                        // 测试通知
                        showNotification('通知测试', '通知功能正常！您将在任务时间到时收到类似提醒。');
                        // 测试声音
                        playReminderSound();
                    } else {
                        if (requestNotificationPermission(true)) {
                            notificationBtn.innerHTML = '🔔 测试通知';
                            notificationBtn.style.background = '#dcfce7';
                            notificationBtn.style.color = '#16a34a';
                        }
                    }
                };
                
                buttonContainer.appendChild(notificationBtn);
                
                // 测试按钮
                const testBtn = document.createElement('button');
                testBtn.className = 'btn btn-test';
                testBtn.innerHTML = '⏰ 测试提醒';
                testBtn.onclick = function() {
                    if (!requestNotificationPermission()) return;
                    
                    // 创建一个测试任务
                    const testTask = {
                        id: 'test-' + Date.now(),
                        title: '测试提醒功能',
                        description: '这是一个测试任务，用于验证提醒功能',
                        dueDate: new Date(Date.now() + 60000).toISOString(), // 1分钟后
                        completed: false,
                        priority: 'high'
                    };
                    
                    setTaskReminder(testTask.id);
                    
                    alert('已设置1分钟后的测试提醒，请保持页面打开，不要关闭浏览器标签页。');
                };
                
                buttonContainer.appendChild(testBtn);
                
                header.appendChild(buttonContainer);
            }
        }

        // 添加通知按钮样式
        const style = document.createElement('style');
        style.textContent = `
            .btn-notification {
                background: #fef3c7;
                color: #d97706;
                border: none;
                padding: 10px 16px;
                border-radius: 8px;
                cursor: pointer;
                font-size: 14px;
                margin-left: 10px;
            }
            
            .btn-notification:hover {
                background: #fde68a;
            }
            
            .btn-test {
                background: #fef3c7;
                color: #d97706;
                border: none;
                padding: 10px 16px;
                border-radius: 8px;
                cursor: pointer;
                font-size: 14px;
                margin-left: 10px;
            }
            
            .btn-test:hover {
                background: #fde68a;
            }
        `;
        document.head.appendChild(style);

        // 按钮功能
        function toggleNotification() {
            if (Notification.permission === 'granted') {
                // 测试通知
                showNotification('通知测试', '通知功能正常！您将在任务时间到时收到类似提醒。');
                playReminderSound();
                updateNotificationButton();
            } else {
                if (requestNotificationPermission(true)) {
                    updateNotificationButton();
                }
            }
        }

        function testReminder() {
            if (!requestNotificationPermission()) return;
            
            // 创建一个测试任务
            const testTask = {
                id: 'test-' + Date.now(),
                title: '测试提醒功能',
                description: '这是一个测试任务，用于验证提醒功能',
                dueDate: new Date(Date.now() + 60000).toISOString(), // 1分钟后
                completed: false,
                priority: 'high'
            };
            
            setTaskReminder(testTask.id);
            
            alert('已设置1分钟后的测试提醒，请保持页面打开，不要关闭浏览器标签页。');
        }

        function updateNotificationButton() {
            const btn = document.querySelector('.btn-notification');
            if (btn && Notification.permission === 'granted') {
                btn.innerHTML = '🔔 测试通知';
                btn.style.background = '#dcfce7';
                btn.style.color = '#16a34a';
                btn.style.borderColor = '#10b981';
            }
        }

        // 页面加载时更新按钮状态
        document.addEventListener('DOMContentLoaded', function() {
            updateNotificationButton();
        });
    </script>
</body>
</html>
